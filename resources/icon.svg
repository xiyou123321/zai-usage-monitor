<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="8" y="8" width="240" height="240" rx="52" ry="52" fill="url(#bg)"/>
  <!-- Gauge arc background -->
  <path d="M 68 178 A 76 76 0 1 1 188 178" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="14" stroke-linecap="round"/>
  <!-- Gauge arc progress (~75%) -->
  <path d="M 68 178 A 76 76 0 1 1 204 112" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>
  <!-- Bar chart -->
  <rect x="92" y="140" width="16" height="30" rx="4" fill="rgba(255,255,255,0.6)"/>
  <rect x="116" y="124" width="16" height="46" rx="4" fill="rgba(255,255,255,0.8)"/>
  <rect x="140" y="108" width="16" height="62" rx="4" fill="#FFFFFF"/>
  <!-- Small dot indicator on gauge -->
  <circle cx="204" cy="112" r="6" fill="#FFFFFF"/>
</svg>
